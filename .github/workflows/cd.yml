name: CD - Publish Docker Image

on:
  # Trigger only after CI workflow completes successfully on main/master or a version tag.
  # This guarantees lint + test + build all passed before any image is published.
  workflow_run:
    workflows: ["CI"]        # must match the `name:` field in ci.yml exactly
    types: [completed]
  workflow_dispatch:         # allow manual trigger (skips the CI gate)

permissions:
  contents: read
  packages: write          # needed to push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. myorg/aegis

jobs:
  # ── Guard: cancel if CI did not succeed or ref is not deployable ──────────
  guard:
    name: Check CI result
    runs-on: ubuntu-latest
    # For workflow_dispatch the conclusion check is skipped (github.event.workflow_run is empty)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master' ||
        startsWith(github.event.workflow_run.head_branch, 'refs/tags/v')))
    outputs:
      sha: ${{ steps.ctx.outputs.sha }}
      ref: ${{ steps.ctx.outputs.ref }}
    steps:
      - name: Export commit context
        id: ctx
        run: |
          # For workflow_run events use the triggering SHA; for manual use current SHA
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          REF="${{ github.event.workflow_run.head_branch || github.ref }}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker image ─────────────────────────────────────────────
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [guard]

    steps:
      # Checkout the exact SHA that passed CI (not necessarily HEAD)
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.sha }}

      # ── Set up QEMU for multi-platform builds ──────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to GitHub Container Registry ───────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags & labels ─────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch push → :latest  (main/master only)
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tag  → :v1.2.3 and :1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # short SHA   → :sha-abc1234
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Aegis Lock Service
            org.opencontainers.image.description=Distributed lock service (Redis / DynamoDB / PostgreSQL / MySQL)
            org.opencontainers.image.licenses=MIT

      # ── Build & push multi-platform image ─────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Print image digest for traceability ───────────────────────────────
      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
