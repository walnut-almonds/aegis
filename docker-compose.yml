version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "16379:6379"
    command: redis-server --save "" --appendonly no
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_DB: aegisdb
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegispass
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  mysql:
    image: mysql:8.0
    container_name: aegis-mysql
    environment:
      MYSQL_DATABASE: aegisdb
      MYSQL_USER: aegis
      MYSQL_PASSWORD: aegispass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uaegis", "-paegispass"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
